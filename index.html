<script>

/* ===== 数据（商业化案例结构）===== */
const works = [
{
    id:"case1",
    title:"电商详情页优化",
    category:"ecom",
    cover:"https://picsum.photos/600/800?1",
    hero:"https://picsum.photos/1200/800?11",
    desc:"针对转化率低的问题进行视觉优化",
    process:"重构信息层级 + 强化卖点表达 + 优化视觉引导",
    result:"+40% 转化率",
    images:[
        "https://picsum.photos/1000/1200?1",
        "https://picsum.photos/1000/1200?2"
    ]
},
{
    id:"case2",
    title:"品牌视觉升级",
    category:"design",
    cover:"https://picsum.photos/600/700?2",
    hero:"https://picsum.photos/1200/800?22",
    desc:"统一品牌视觉系统",
    process:"LOGO升级 + 视觉规范 + 应用延展",
    result:"品牌高级感显著提升",
    images:[
        "https://picsum.photos/1000/1200?3"
    ]
}
];


/* ===== 渲染卡片 ===== */
function render(list){
    const grid=document.getElementById("grid");
    grid.innerHTML="";

    list.forEach(w=>{
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`
            <img src="${w.cover}">
            <div class="overlay">
                <h4>${w.title}</h4>
                <p>${w.result}</p>
            </div>
        `;

        div.onclick=()=>openCase(w.id);
        grid.appendChild(div);
    });
}


/* ===== 筛选 ===== */
function filterWork(type){
    document.querySelectorAll(".filter span").forEach(s=>s.classList.remove("active"));
    event.target.classList.add("active");

    if(type==="all") render(works);
    else render(works.filter(w=>w.category===type));
}


/* ===== 核心：Behance式页面切换 ===== */
function openCase(id){
    const work = works.find(w=>w.id===id);

    // 改URL（可分享）
    location.hash = id;

    // 创建页面
    let page = document.getElementById("casePage");
    if(!page){
        page = document.createElement("div");
        page.id="casePage";
        page.style.position="fixed";
        page.style.top="0";
        page.style.left="0";
        page.style.width="100%";
        page.style.height="100%";
        page.style.background="#000";
        page.style.overflow="auto";
        page.style.zIndex="9999";
        document.body.appendChild(page);
    }

    page.innerHTML = `
        <div style="padding:40px;max-width:1000px;margin:auto">

            <!-- 封面 -->
            <img src="${work.hero}" style="width:100%;border-radius:10px;margin-bottom:40px">

            <!-- 标题 -->
            <h1 style="font-size:42px;margin-bottom:20px">${work.title}</h1>

            <!-- 描述 -->
            <p style="color:#aaa;margin-bottom:20px">${work.desc}</p>

            <!-- 过程 -->
            <p style="margin-bottom:20px"><b>项目过程：</b>${work.process}</p>

            <!-- 结果（关键卖点） -->
            <p style="font-size:20px;margin-bottom:30px"><b>项目结果：</b>${work.result}</p>

            <!-- 图片 -->
            ${work.images.map(i=>`<img src="${i}" style="width:100%;margin:20px 0;border-radius:10px">`).join("")}

            <!-- CTA（接单核心） -->
            <div style="margin-top:40px;padding:30px;background:#111;border-radius:12px;text-align:center">
                <h3>需要类似项目？</h3>
                <p style="color:#aaa">微信：xxx / 邮箱：xxx@email.com</p>
                <a style="display:inline-block;margin-top:10px;padding:10px 20px;background:#fff;color:#000;border-radius:20px;text-decoration:none">立即合作</a>
            </div>

            <!-- 关闭 -->
            <div onclick="closeCase()" style="position:fixed;top:30px;right:40px;font-size:30px;cursor:pointer">×</div>

        </div>
    `;
}


/* 关闭 */
function closeCase(){
    const page=document.getElementById("casePage");
    if(page) page.remove();
    history.pushState("", document.title, window.location.pathname);
}


/* ===== 支持刷新打开案例 ===== */
window.onload=()=>{
    render(works);

    if(location.hash){
        const id = location.hash.replace("#","");
        openCase(id);
    }
};

</script>
