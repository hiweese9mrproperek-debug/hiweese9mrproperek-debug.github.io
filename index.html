<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>林歌的作品集</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:#fff;
}

/* 顶部导航 */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  border-bottom:1px solid #222;
}

nav a{
  margin-left:20px;
  color:#aaa;
  text-decoration:none;
  cursor:pointer;
  padding-bottom:5px;
}

nav a:hover{
  color:#fff;
}

/* 选中状态 */
nav a.active{
  color:#fff;
  border-bottom:2px solid #fff;
}

/* Banner */
.banner{
  padding:80px 60px 40px;
}

.banner h1{
  font-size:42px;
  margin:0;
}

.banner p{
  color:#888;
}

/* 网格布局（稳定瀑布感） */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
  padding:20px 60px 60px;
}

/* 卡片 */
.card{
  position:relative;
  overflow:hidden;
  border-radius:10px;
  text-decoration:none;
  color:#fff;
}

/* 图片 */
.card img{
  width:100%;
  display:block;
  border-radius:10px;
  transition:0.4s;
}

/* 不同高度（模拟瀑布流） */
.card:nth-child(3n) img{
  height:320px;
  object-fit:cover;
}

.card:nth-child(3n+1) img{
  height:420px;
  object-fit:cover;
}

.card:nth-child(3n+2) img{
  height:260px;
  object-fit:cover;
}

/* hover效果 */
.card:hover img{
  transform:scale(1.05);
  opacity:0.7;
}

/* 遮罩渐变 */
.overlay{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:20px;
  opacity:0;
  transition:0.3s;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.card:hover .overlay{
  opacity:1;
}

.overlay h3{
  margin:0;
}

.overlay p{
  margin:5px 0 0;
  font-size:12px;
  color:#ccc;
}

/* 响应式 */
@media(max-width:1000px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
  header{padding:20px;}
  .banner{padding:40px 20px;}
  .grid{padding:20px;}
  .grid{grid-template-columns:1fr;}
}
</style>

</head>

<body>

<header>
  <div>林歌的作品集</div>
  <nav>
    <a class="active" onclick="filter('all', event)">全部</a>
    <a onclick="filter('平面', event)">平面设计</a>
    <a onclick="filter('电商', event)">电商设计</a>
    <a onclick="filter('视频', event)">视频</a>
    <a onclick="filter('文章', event)">文章</a>
  </nav>
</header>

<div class="banner">
  <h1>精选作品</h1>
  <p>Branding · E-commerce · Content Design</p>
</div>

<div class="grid">

  <!-- 平面 -->
  <a href="#" class="card" data-type="平面">
    <img src="https://picsum.photos/400/600?1">
    <div class="overlay">
      <h3>品牌海报设计</h3>
      <p>平面设计 · 2025</p>
    </div>
  </a>

  <a href="#" class="card" data-type="平面">
    <img src="https://picsum.photos/400/500?2">
    <div class="overlay">
      <h3>LOGO设计</h3>
      <p>品牌视觉</p>
    </div>
  </a>

  <!-- 电商 -->
  <a href="#" class="card" data-type="电商">
    <img src="https://picsum.photos/400/700?3">
    <div class="overlay">
      <h3>电商详情页</h3>
      <p>转化率提升</p>
    </div>
  </a>

  <!-- 视频 -->
  <a href="#" class="card" data-type="视频">
    <img src="https://picsum.photos/400/450?4">
    <div class="overlay">
      <h3>短视频剪辑</h3>
      <p>内容策划</p>
    </div>
  </a>

  <!-- 文章 -->
  <a href="#" class="card" data-type="文章">
    <img src="https://picsum.photos/400/550?5">
    <div class="overlay">
      <h3>公众号文章</h3>
      <p>阅读10W+</p>
    </div>
  </a>

</div>

<script>
function filter(type, event){
  let cards = document.querySelectorAll('.card');
  let links = document.querySelectorAll('nav a');

  links.forEach(link=>link.classList.remove('active'));
  event.target.classList.add('active');

  cards.forEach(card=>{
    if(type === 'all' || card.dataset.type === type){
      card.style.display = 'block';
    }else{
      card.style.display = 'none';
    }
  });
}
</script>

</body>
</html>
