<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>林歌作品网</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:#0d0d0d;
    color:#fff;
}

/* ===== 顶部导航 ===== */
header{
    position:fixed;
    width:100%;
    top:0;
    z-index:999;
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    background:rgba(13,13,13,0.8);
    backdrop-filter:blur(12px);
}
.logo{font-weight:600}
nav a{
    margin-left:30px;
    color:#aaa;
    text-decoration:none;
}
nav a:hover{color:#fff}

/* ===== Hero ===== */
.hero{
    padding:160px 60px 60px;
    max-width:900px;
}
.hero h1{
    font-size:64px;
    margin-bottom:20px;
}
.hero p{
    color:#aaa;
    margin-bottom:30px;
}
.btn{
    background:#fff;
    color:#000;
    padding:12px 24px;
    border-radius:30px;
    text-decoration:none;
}

/* ===== 分类 ===== */
.filter{
    padding:20px 60px;
}
.filter span{
    margin-right:20px;
    color:#666;
    cursor:pointer;
}
.filter span.active{
    color:#fff;
    border-bottom:2px solid #fff;
}

/* ===== 瀑布流（Behance核心）===== */
.grid{
    column-count:4;
    column-gap:20px;
    padding:20px 60px;
}
.card{
    break-inside:avoid;
    margin-bottom:20px;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    position:relative;
    transform:translateY(30px);
    opacity:0;
    animation:fadeUp .6s forwards;
}
.card img{
    width:100%;
    transition:.5s;
}
.card:hover img{
    transform:scale(1.08);
}
.overlay{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    padding:20px;
    background:linear-gradient(transparent,rgba(0,0,0,0.8));
    opacity:0;
    transition:.3s;
}
.card:hover .overlay{
    opacity:1;
}
.overlay h4{font-size:14px}
.overlay p{font-size:12px;color:#aaa}

@keyframes fadeUp{
    to{transform:translateY(0);opacity:1}
}

/* ===== 详情页（Behance沉浸式）===== */
.page{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:#000;
    z-index:1000;
    overflow:auto;
    display:none;
}
.page-inner{
    max-width:1000px;
    margin:100px auto;
    padding:20px;
}
.page h2{margin-bottom:10px}
.page p{color:#aaa;margin-bottom:20px}
.page img{
    width:100%;
    margin:20px 0;
    border-radius:10px;
}

/* CTA */
.cta-box{
    margin-top:40px;
    padding:30px;
    background:#111;
    border-radius:12px;
    text-align:center;
}
.cta-btn{
    margin-top:10px;
    display:inline-block;
    padding:10px 20px;
    background:#fff;
    color:#000;
    border-radius:20px;
    text-decoration:none;
}

.close{
    position:fixed;
    right:40px;
    top:30px;
    font-size:30px;
    cursor:pointer;
}

/* ===== 服务 ===== */
.services{
    padding:60px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}
.service{
    background:#111;
    padding:30px;
    border-radius:12px;
}

/* ===== 信任 ===== */
.stats{
    display:flex;
    gap:60px;
    padding:40px 60px;
}
.stat h3{font-size:28px}
.stat p{color:#777}

/* 响应 */
@media(max-width:1000px){
    .grid{column-count:2}
    .services{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
    <div class="logo">林歌作品网</div>
    <nav>
        <a href="#">首页</a>
        <a href="#">作品</a>
        <a href="#">服务</a>
        <a href="#">联系</a>
    </nav>
</header>

<!-- ===== 首屏 ===== -->
<section class="hero">
    <h1>让设计直接产生商业价值</h1>
    <p>电商转化 / 品牌视觉 / 内容增长</p>
    <a class="btn" href="#">立即合作</a>
</section>

<!-- 信任 -->
<div class="stats">
    <div class="stat"><h3>50+</h3><p>项目</p></div>
    <div class="stat"><h3>10+</h3><p>行业</p></div>
    <div class="stat"><h3>95%</h3><p>满意度</p></div>
</div>

<!-- 服务 -->
<section class="services">
    <div class="service">电商设计（转化提升）</div>
    <div class="service">品牌视觉（高级感）</div>
    <div class="service">内容创作（涨粉）</div>
</section>

<!-- 分类 -->
<div class="filter">
    <span class="active" onclick="filterWork('all')">全部</span>
    <span onclick="filterWork('design')">平面</span>
    <span onclick="filterWork('ecom')">电商</span>
    <span onclick="filterWork('video')">视频</span>
</div>

<!-- 瀑布流 -->
<div class="grid" id="grid"></div>

<!-- 详情页 -->
<div class="page" id="page">
    <div class="close" onclick="closePage()">×</div>
    <div class="page-inner" id="pageContent"></div>
</div>

<script>

/* ===== JSON数据（可替换CMS）===== */
const works=[
{
title:"电商详情页优化",
category:"ecom",
cover:"https://picsum.photos/500/700?1",
desc:"提升转化率",
result:"+40% 转化",
images:["https://picsum.photos/800/1000?1","https://picsum.photos/800/1000?2"]
},
{
title:"品牌视觉升级",
category:"design",
cover:"https://picsum.photos/500/600?2",
desc:"品牌重塑",
result:"品牌感提升",
images:["https://picsum.photos/800/1000?3"]
},
{
title:"短视频项目",
category:"video",
cover:"https://picsum.photos/500/650?3",
desc:"内容增长",
result:"播放+300%",
images:["https://picsum.photos/800/600?4"]
}
];

/* 渲染 */
function render(list){
    const grid=document.getElementById("grid");
    grid.innerHTML="";
    list.forEach((w,i)=>{
        const el=document.createElement("div");
        el.className="card";
        el.style.animationDelay=i*0.1+"s";
        el.innerHTML=`
            <img src="${w.cover}">
            <div class="overlay">
                <h4>${w.title}</h4>
                <p>${w.result}</p>
            </div>
        `;
        el.onclick=()=>openPage(w);
        grid.appendChild(el);
    });
}

/* 筛选 */
function filterWork(type){
    document.querySelectorAll(".filter span").forEach(s=>s.classList.remove("active"));
    event.target.classList.add("active");

    if(type==="all") render(works);
    else render(works.filter(w=>w.category===type));
}

/* 详情页（Behance风） */
function openPage(w){
    const page=document.getElementById("page");
    const content=document.getElementById("pageContent");

    content.innerHTML=`
        <h2>${w.title}</h2>
        <p>${w.desc}</p>
        <p><b>结果：</b>${w.result}</p>
    `;

    w.images.forEach(img=>{
        content.innerHTML+=`<img src="${img}">`;
    });

    content.innerHTML+=`
        <div class="cta-box">
            <h3>需要类似项目？</h3>
            <p>微信：xxxx / 邮箱：xxx@email.com</p>
            <a class="cta-btn">立即合作</a>
        </div>
    `;

    page.style.display="block";
}

function closePage(){
    document.getElementById("page").style.display="none";
}

/* 初始化 */
render(works);

</script>

</body>
</html>
