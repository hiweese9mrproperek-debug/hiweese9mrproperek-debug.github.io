<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Portfolio</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:#fff;
}

/* 顶部导航 */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  border-bottom:1px solid #222;
}

nav a{
  margin-left:20px;
  color:#aaa;
  text-decoration:none;
}

nav a:hover{
  color:#fff;
}

/* Banner */
.banner{
  padding:80px 60px 40px;
}

.banner h1{
  font-size:42px;
  margin:0;
}

.banner p{
  color:#888;
}

/* 网格 */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
  padding:20px 60px 60px;
}

/* 卡片 */
.card{
  position:relative;
  overflow:hidden;
  border-radius:10px;
  cursor:pointer;
}

.card img{
  width:100%;
  display:block;
  transition:0.4s;
}

/* hover效果 */
.card:hover img{
  transform:scale(1.05);
  opacity:0.7;
}

/* 遮罩层 */
.overlay{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:20px;
  opacity:0;
  transition:0.3s;
}

.card:hover .overlay{
  opacity:1;
}

.overlay h3{
  margin:0;
}

.overlay p{
  margin:5px 0 0;
  font-size:12px;
  color:#ccc;
}

</style>
</head>

<body>

<header>
  <div>我的作品集</div>
  <nav>
    <a href="#">平面设计</a>
    <a href="#">电商设计</a>
    <a href="#">视频</a>
    <a href="#">公众号文章</a>
    <a href="#">新闻稿</a>
  </nav>
</header>

<div class="banner">
  <h1>精选作品</h1>
  <p>Branding · E-commerce · Content Design</p>
</div>

<div class="grid">

  <!-- 卡片1 -->
  <div class="card">
    <img src="https://picsum.photos/400/300?1">
    <div class="overlay">
      <h3>品牌海报设计</h3>
      <p>平面设计 · 2025</p>
    </div>
  </div>

  <!-- 卡片2 -->
  <div class="card">
    <img src="https://picsum.photos/400/300?2">
    <div class="overlay">
      <h3>电商详情页</h3>
      <p>电商设计 · 转化率提升</p>
    </div>
  </div>

  <!-- 卡片3 -->
  <div class="card">
    <img src="https://picsum.photos/400/300?3">
    <div class="overlay">
      <h3>短视频项目</h3>
      <p>视频 · 剪辑 + 策划</p>
    </div>
  </div>

</div>

</body>
</html>
