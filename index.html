<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>林歌作品网</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:#0d0d0d;
    color:#fff;
}

/* ===== 导航 ===== */
header{
    position:fixed;
    width:100%;
    top:0;
    background:rgba(13,13,13,0.9);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    z-index:999;
}
.logo{font-size:18px;font-weight:600}
nav a{margin-left:30px;color:#aaa;text-decoration:none}
nav a:hover{color:#fff}

/* ===== 首屏（成交核心） ===== */
.hero{
    padding:160px 60px 100px;
}
.hero h1{
    font-size:56px;
    line-height:1.4;
}
.hero p{
    margin-top:20px;
    color:#aaa;
    max-width:500px;
}
.cta-btn{
    display:inline-block;
    margin-top:30px;
    padding:12px 28px;
    border:1px solid #fff;
    text-decoration:none;
    color:#fff;
    transition:.3s;
}
.cta-btn:hover{
    background:#fff;
    color:#000;
}

/* ===== 信任背书 ===== */
.trust{
    display:flex;
    gap:60px;
    padding:60px;
}
.trust div{
    font-size:28px;
}
.trust span{
    display:block;
    font-size:14px;
    color:#888;
}

/* ===== 服务 ===== */
.services{
    padding:60px;
}
.service-grid{
    display:flex;
    gap:30px;
}
.service{
    flex:1;
    background:#111;
    padding:30px;
    border-radius:10px;
}
.service h3{margin-bottom:10px}
.service p{color:#aaa;font-size:14px}

/* ===== 案例 ===== */
.grid{
    column-count:4;
    column-gap:20px;
    padding:20px 60px;
}
.card{
    break-inside:avoid;
    margin-bottom:20px;
    cursor:pointer;
    position:relative;
    border-radius:12px;
    overflow:hidden;
    opacity:0;
    transform:translateY(20px);
    transition:.5s;
}
.card.show{opacity:1;transform:translateY(0)}
.card img{width:100%;transition:.4s}
.card:hover img{transform:scale(1.08)}
.card-title{
    position:absolute;
    bottom:10px;
    left:10px;
    font-size:14px;
    opacity:0;
}
.card:hover .card-title{opacity:1}

/* ===== 详情页 ===== */
.detail{
    display:none;
    padding:120px 60px;
    max-width:900px;
    margin:auto;
}
.detail h1{font-size:40px}
.detail p{color:#aaa;margin:20px 0}
.detail img{width:100%;margin:20px 0;border-radius:10px}

/* 联系区 */
.contact{
    margin-top:40px;
    padding:30px;
    background:#111;
    border-radius:10px;
}
.contact a{
    display:inline-block;
    margin-top:10px;
    border:1px solid #fff;
    padding:10px 20px;
    text-decoration:none;
    color:#fff;
}

/* 响应式 */
@media(max-width:1000px){
    .grid{column-count:2}
    .service-grid{flex-direction:column}
}
</style>
</head>

<body>

<header>
    <div class="logo">林歌作品网</div>
    <nav>
        <a href="#">首页</a>
        <a href="#">作品</a>
        <a href="#">服务</a>
        <a href="#">联系</a>
    </nav>
</header>

<!-- ===== 首页 ===== -->
<div id="home">

<section class="hero">
    <h1>为品牌提供高转化设计解决方案</h1>
    <p>专注平面设计、电商视觉、短视频内容，帮助客户提升品牌形象与转化率</p>
    <a href="mailto:xxx@qq.com" class="cta-btn">立即咨询</a>
</section>

<!-- 信任 -->
<div class="trust">
    <div>50+<span>服务客户</span></div>
    <div>100+<span>项目经验</span></div>
    <div>3年+<span>设计经验</span></div>
</div>

<!-- 服务 -->
<section class="services">
    <h2>服务内容</h2>
    <div class="service-grid">
        <div class="service">
            <h3>平面设计</h3>
            <p>品牌海报 / 宣传物料 / VI视觉</p>
        </div>
        <div class="service">
            <h3>电商设计</h3>
            <p>详情页 / 主图 / 提升转化</p>
        </div>
        <div class="service">
            <h3>视频制作</h3>
            <p>短视频剪辑 / 内容创作</p>
        </div>
    </div>
</section>

<!-- 案例 -->
<div class="grid" id="grid"></div>

</div>

<!-- ===== 详情页 ===== -->
<div class="detail" id="detail">
    <div onclick="goHome()" style="cursor:pointer;color:#aaa">← 返回</div>
    <h1 id="dTitle"></h1>
    <p id="dDesc"></p>
    <div id="dResult" style="color:#0f0"></div>
    <div id="dImages"></div>

    <div class="contact">
        <h3>需要类似项目？</h3>
        <p>微信：linge_design</p>
        <a href="mailto:xxx@qq.com">立即合作</a>
    </div>
</div>

<script>

/* ===== 数据（可扩展） ===== */
const works=[
{
id:1,
title:"品牌海报设计",
desc:"为品牌打造统一视觉体系",
result:"曝光提升200%",
cover:"https://picsum.photos/500/700?1",
images:["https://picsum.photos/800/1000?1"]
},
{
id:2,
title:"电商详情页",
desc:"优化页面结构提升转化",
result:"转化率提升35%",
cover:"https://picsum.photos/500/600?2",
images:["https://picsum.photos/800/1000?2"]
}
];

/* 渲染 */
function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";
works.forEach((w,i)=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="${w.cover}">
<div class="card-title">${w.title}</div>
`;
div.onclick=()=>{
history.pushState(null,"",`?id=${w.id}`);
openDetail(w.id);
};
grid.appendChild(div);
setTimeout(()=>div.classList.add("show"),i*100);
});
}

/* 详情 */
function openDetail(id){
const w=works.find(i=>i.id==id);

document.getElementById("home").style.display="none";
document.getElementById("detail").style.display="block";

dTitle.innerText=w.title;
dDesc.innerText=w.desc;
dResult.innerText="项目成果："+w.result;

const box=document.getElementById("dImages");
box.innerHTML="";
w.images.forEach(img=>{
const el=document.createElement("img");
el.src=img;
box.appendChild(el);
});
}

/* 返回 */
function goHome(){
history.pushState(null,"","/");
detail.style.display="none";
home.style.display="block";
}

/* 初始化 */
window.onload=()=>{
const id=new URLSearchParams(location.search).get("id");
if(id) openDetail(id);
else render();
};

</script>

</body>
</html>
