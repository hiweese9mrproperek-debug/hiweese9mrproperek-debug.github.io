<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>林歌作品网</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:#0d0d0d;
    color:#fff;
}

/* ===== 导航 ===== */
header{
    position:fixed;
    width:100%;
    top:0;
    background:rgba(13,13,13,0.9);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    z-index:999;
}
.logo{font-size:18px;font-weight:600}
nav a{
    margin-left:30px;
    color:#aaa;
    text-decoration:none;
}
nav a:hover{color:#fff}

/* ===== 首屏 ===== */
.hero{
    padding:160px 60px 80px;
}
.hero h1{
    font-size:64px;
    margin-bottom:20px;
}
.hero p{color:#aaa}

/* ===== 分类 ===== */
.filter{
    padding:20px 60px;
}
.filter span{
    margin-right:20px;
    cursor:pointer;
    color:#888;
}
.filter span.active{
    color:#fff;
    border-bottom:2px solid #fff;
}

/* ===== 瀑布流 ===== */
.grid{
    column-count:4;
    column-gap:20px;
    padding:20px 60px;
}
.card{
    break-inside:avoid;
    margin-bottom:20px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    border-radius:12px;
}
.card img{
    width:100%;
    border-radius:12px;
    transition:.4s;
}
.card:hover img{
    transform:scale(1.05);
}
.card-title{
    position:absolute;
    bottom:10px;
    left:10px;
    font-size:14px;
    opacity:0;
    transition:.3s;
}
.card:hover .card-title{
    opacity:1;
}

/* ===== 详情页 ===== */
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#000;
    display:none;
    overflow:auto;
    z-index:1000;
}
.modal-content{
    max-width:900px;
    margin:80px auto;
}
.modal img{width:100%;margin-bottom:20px}
.close{
    position:fixed;
    top:30px;
    right:40px;
    font-size:30px;
    cursor:pointer;
}

/* ===== 动画 ===== */
.fade{
    animation:fadeIn .6s ease;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1}
}

/* 响应式 */
@media(max-width:1200px){
    .grid{column-count:3}
}
@media(max-width:768px){
    .grid{column-count:2}
}
</style>
</head>

<body>

<header>
    <div class="logo">林歌作品网</div>
    <nav>
        <a href="#">首页</a>
        <a href="#">作品</a>
        <a href="#">服务</a>
        <a href="#">关于</a>
        <a href="#">联系</a>
    </nav>
</header>

<section class="hero">
    <h1>设计作品集</h1>
    <p>平面 · 电商 · 视频 · 内容创作</p>
</section>

<div class="filter">
    <span class="active" onclick="filterWork('all')">全部</span>
    <span onclick="filterWork('design')">平面设计</span>
    <span onclick="filterWork('ecom')">电商设计</span>
    <span onclick="filterWork('video')">视频</span>
    <span onclick="filterWork('article')">文章</span>
</div>

<div class="grid" id="grid"></div>

<!-- 详情 -->
<div class="modal" id="modal">
    <div class="close" onclick="closeModal()">×</div>
    <div class="modal-content" id="modalContent"></div>
</div>

<script>

/* ===== 数据（可随意增加） ===== */
const works = [
{
    title:"品牌海报设计",
    category:"design",
    cover:"https://picsum.photos/500/700?1",
    images:[
        "https://picsum.photos/800/1000?1",
        "https://picsum.photos/800/1000?2"
    ]
},
{
    title:"电商详情页",
    category:"ecom",
    cover:"https://picsum.photos/500/600?3",
    images:[
        "https://picsum.photos/800/1000?3"
    ]
},
{
    title:"短视频剪辑",
    category:"video",
    cover:"https://picsum.photos/500/650?4",
    images:[
        "https://picsum.photos/800/600?4"
    ]
},
{
    title:"公众号文章",
    category:"article",
    cover:"https://picsum.photos/500/750?5",
    images:[
        "https://picsum.photos/800/1000?5"
    ]
}
];

/* ===== 渲染 ===== */
function render(list){
    const grid = document.getElementById("grid");
    grid.innerHTML="";
    list.forEach(w=>{
        const div=document.createElement("div");
        div.className="card fade";
        div.innerHTML=`
            <img src="${w.cover}">
            <div class="card-title">${w.title}</div>
        `;
        div.onclick=()=>openModal(w);
        grid.appendChild(div);
    });
}

/* ===== 筛选 ===== */
function filterWork(type){
    document.querySelectorAll(".filter span").forEach(s=>s.classList.remove("active"));
    event.target.classList.add("active");

    if(type==="all") render(works);
    else render(works.filter(w=>w.category===type));
}

/* ===== 详情 ===== */
function openModal(work){
    const modal=document.getElementById("modal");
    const content=document.getElementById("modalContent");

    content.innerHTML="";
    work.images.forEach(img=>{
        const el=document.createElement("img");
        el.src=img;
        content.appendChild(el);
    });

    modal.style.display="block";
}
function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* 初始化 */
render(works);

</script>

</body>
</html>
