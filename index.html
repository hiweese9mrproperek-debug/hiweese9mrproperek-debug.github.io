<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>林歌作品网</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
}

/* 顶部 */
header{
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    border-bottom:1px solid #222;
}

.logo{
    font-weight:bold;
}

/* 导航 */
nav a{
    margin-left:20px;
    color:#aaa;
    cursor:pointer;
    text-decoration:none;
}
nav a:hover{color:#fff}

/* Hero */
.hero{
    padding:80px 60px 40px;
}
.hero h1{
    font-size:48px;
}
.hero p{
    color:#777;
}

/* 网格 */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:0 60px 60px;
}

/* 卡片 */
.card{
    position:relative;
    overflow:hidden;
    border-radius:10px;
    cursor:pointer;
}
.card img{
    width:100%;
    display:block;
}
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;
    background:linear-gradient(transparent,rgba(0,0,0,.9));
}

/* About */
.about{
    padding:80px 60px;
    border-top:1px solid #222;
}
.about h2{margin-bottom:10px;}
.about p{color:#aaa;}

/* Contact */
.contact{
    padding:80px 60px;
    border-top:1px solid #222;
}
.contact a{
    color:#4da3ff;
}
</style>
</head>

<body>

<header>
    <div class="logo">林歌作品网</div>
    <nav>
        <a href="#">作品</a>
        <a href="#about">关于我</a>
        <a href="#contact">联系</a>
    </nav>
</header>

<section class="hero">
    <h1>设计作品集</h1>
    <p>平面 · 电商 · 视频 · 内容创作</p>
</section>

<section class="grid">

    <!-- 项目1 -->
    <div class="card" onclick="location.href='project1.html'">
        <img src="https://picsum.photos/600/800?1">
        <div class="overlay">
            品牌海报设计
        </div>
    </div>

    <!-- 项目2 -->
    <div class="card" onclick="location.href='project2.html'">
        <img src="https://picsum.photos/600/700?2">
        <div class="overlay">
            电商详情页
        </div>
    </div>

</section>

<!-- 关于我 -->
<section id="about" class="about">
    <h2>关于我</h2>
    <p>
        我是林歌，一名视觉设计师，专注于品牌设计、电商视觉和内容创作。
        拥有完整的项目经验，从策略到执行，帮助品牌提升视觉表现和转化。
    </p>
</section>

<!-- 联系 -->
<section id="contact" class="contact">
    <h2>联系我</h2>
    <p>邮箱：2900242076@qq.com</p>
    <p>微信：17700275778</p>
</section>

</body>
</html>
