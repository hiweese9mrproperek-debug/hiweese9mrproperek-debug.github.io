<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My Portfolio</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

/* 顶部导航 */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  border-bottom:1px solid #333;
}

nav a {
  margin:0 15px;
  color:#ccc;
  text-decoration:none;
}

nav a:hover {
  color:#fff;
}

/* 标题 */
h2 {
  padding:40px 40px 10px;
}

/* 网格布局 */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px 40px;
}

/* 卡片 */
.card {
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-6px);
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.card img {
  width:100%;
}

.card .content {
  padding:12px;
}

/* 视频容器（重点🔥） */
.video-box {
  max-width:800px;
  margin:20px auto;
}

.video-box iframe {
  width:100%;
  height:450px;
  border-radius:12px;
}

/* 文章卡片 */
.article {
  max-width:400px;
}
</style>
</head>

<body>

<header>
  <div>我的作品集</div>
  <nav>
    <a href="#">摄影</a>
    <a href="#">视频</a>
    <a href="#">文章</a>
  </nav>
</header>

<!-- 摄影 -->
<h2>摄影作品</h2>
<div class="grid">

  <div class="card">
    <img src="https://picsum.photos/400/300?1">
    <div class="content">摄影作品1</div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/300?2">
    <div class="content">摄影作品2</div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/300?3">
    <div class="content">摄影作品3</div>
  </div>

</div>

<!-- 视频 -->
<h2>视频作品</h2>

<div class="video-box">
  <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
</div>

<!-- 文章 -->
<h2>文章作品</h2>

<div class="grid">
  <div class="card article">
    <img src="https://picsum.photos/400/200">
    <div class="content">
      公众号文章标题<br>
      <a href="#" style="color:#4da3ff;">点击阅读</a>
    </div>
  </div>
</div>

</body>
</html>
