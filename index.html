<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>林歌作品网</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:#fff;
}

/* 顶部导航 */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  border-bottom:1px solid #222;
}

nav a{
  margin-left:20px;
  color:#aaa;
  text-decoration:none;
  cursor:pointer;
}

nav a:hover{
  color:#fff;
}

/* Banner */
.banner{
  padding:80px 60px 40px;
}

.banner h1{
  font-size:42px;
  margin:0;
}

.banner p{
  color:#888;
}

/* 瀑布流 */
.grid{
  column-count:3;
  column-gap:20px;
  padding:20px 60px 60px;
}

.card{
  display:block;
  break-inside:avoid;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
  border-radius:10px;
  text-decoration:none;
  color:#fff;
}

/* 图片 */
.card img{
  width:100%;
  display:block;
  border-radius:10px;
  transition:0.4s;
}

/* hover效果 */
.card:hover img{
  transform:scale(1.05);
  opacity:0.7;
}

/* 遮罩 */
.overlay{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:20px;
  opacity:0;
  transition:0.3s;
}

.card:hover .overlay{
  opacity:1;
}

.overlay h3{
  margin:0;
}

.overlay p{
  margin:5px 0 0;
  font-size:12px;
  color:#ccc;
}

/* 响应式 */
@media(max-width:1000px){
  .grid{column-count:2;}
}

@media(max-width:600px){
  .grid{column-count:1;}
}
</style>

</head>

<body>

<header>
  <div>我的作品集</div>
  <nav>
    <a onclick="filter('all')">全部</a>
    <a onclick="filter('平面')">平面设计</a>
    <a onclick="filter('电商')">电商设计</a>
    <a onclick="filter('视频')">视频</a>
    <a onclick="filter('文章')">文章</a>
  </nav>
</header>

<div class="banner">
  <h1>精选作品</h1>
  <p>Branding · E-commerce · Content Design</p>
</div>

<div class="grid">

  <!-- 平面设计 -->
  <a href="#" class="card" data-type="平面">
    <img src="https://picsum.photos/400/500?1">
    <div class="overlay">
      <h3>品牌海报设计</h3>
      <p>平面设计 · 2025</p>
    </div>
  </a>

  <a href="#" class="card" data-type="平面">
    <img src="https://picsum.photos/400/300?2">
    <div class="overlay">
      <h3>LOGO设计</h3>
      <p>品牌视觉</p>
    </div>
  </a>

  <!-- 电商设计 -->
  <a href="#" class="card" data-type="电商">
    <img src="https://picsum.photos/400/600?3">
    <div class="overlay">
      <h3>电商详情页</h3>
      <p>转化率提升</p>
    </div>
  </a>

  <!-- 视频 -->
  <a href="#" class="card" data-type="视频">
    <img src="https://picsum.photos/400/350?4">
    <div class="overlay">
      <h3>短视频剪辑</h3>
      <p>内容策划</p>
    </div>
  </a>

  <!-- 文章 -->
  <a href="#" class="card" data-type="文章">
    <img src="https://picsum.photos/400/450?5">
    <div class="overlay">
      <h3>公众号文章</h3>
      <p>阅读10W+</p>
    </div>
  </a>

</div>

<script>
function filter(type){
  let cards = document.querySelectorAll('.card');

  cards.forEach(card=>{
    if(type === 'all' || card.dataset.type === type){
      card.style.display = 'block';
    }else{
      card.style.display = 'none';
    }
  });
}
</script>

</body>
</html>
