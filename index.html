<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: #fff;
    }
    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      border-bottom: 1px solid #333;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: #222;
      padding: 10px;
      border-radius: 10px;
      transition: 0.3s;
    }
    .card:hover {
      transform: scale(1.05);
    }
    img {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>我的作品集</header>

<div class="grid">
  <div class="card">
    <img src="https://picsum.photos/400/300?1">
    <p>摄影作品1</p>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/300?2">
    <p>摄影作品2</p>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/300?3">
    <p>摄影作品3</p>
  </div>
</div>

</body>
</html>
