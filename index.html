<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林歌作品网</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d0d0d;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

/* 顶部导航 */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    border-bottom:1px solid #222;
    position:sticky;
    top:0;
    background:#0d0d0d;
    z-index:999;
}

.logo{
    font-size:22px;
    font-weight:700;
    letter-spacing:1px;
}

nav a{
    margin-left:28px;
    color:#888;
    text-decoration:none;
    cursor:pointer;
    transition:.3s;
    font-size:15px;
}

nav a:hover,
nav a.active{
    color:#fff;
}

/* Hero */
.hero{
    padding:90px 60px 50px;
}

.hero h1{
    font-size:54px;
    margin-bottom:12px;
}

.hero p{
    color:#777;
    font-size:18px;
}

/* 瀑布流 */
.grid{
    column-count:3;
    column-gap:22px;
    padding:0 60px 60px;
}

@media(max-width:1000px){
    .grid{
        column-count:2;
    }
}

@media(max-width:700px){
    header{
        padding:20px 24px;
        flex-direction:column;
        gap:16px;
    }

    .hero{
        padding:60px 24px 40px;
    }

    .grid{
        column-count:1;
        padding:0 24px 40px;
    }
}

/* 卡片 */
.card{
    break-inside:avoid;
    margin-bottom:22px;
    background:#171717;
    border-radius:14px;
    overflow:hidden;
    transition:.35s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 30px rgba(255,255,255,.06);
}

.card img{
    width:100%;
    display:block;
}

.info{
    padding:14px;
}

.title{
    font-size:16px;
    font-weight:600;
}

.type{
    font-size:13px;
    color:#888;
    margin-top:6px;
}

/* 视频 */
.video iframe{
    width:100%;
    height:260px;
    border:none;
    display:block;
}
</style>
</head>

<body>

<header>
    <div class="logo">林歌作品网</div>

    <nav>
        <a class="active" onclick="filterProjects('all', event)">全部</a>
        <a onclick="filterProjects('design', event)">平面设计</a>
        <a onclick="filterProjects('ecommerce', event)">电商设计</a>
        <a onclick="filterProjects('video', event)">视频</a>
        <a onclick="filterProjects('wechat', event)">公众号文章</a>
        <a onclick="filterProjects('news', event)">新闻稿</a>
    </nav>
</header>

<section class="hero">
    <h1>精选作品</h1>
    <p>Branding · E-commerce · Content Design</p>
</section>

<section class="grid">

    <!-- 平面设计 -->
    <div class="card design">
        <img src="https://picsum.photos/600/820?random=1">
        <div class="info">
            <div class="title">品牌海报设计</div>
            <div class="type">平面设计</div>
        </div>
    </div>

    <div class="card design">
        <img src="https://picsum.photos/600/720?random=2">
        <div class="info">
            <div class="title">节日营销海报</div>
            <div class="type">平面设计</div>
        </div>
    </div>

    <!-- 电商 -->
    <div class="card ecommerce">
        <img src="https://picsum.photos/600/650?random=3">
        <div class="info">
            <div class="title">淘宝详情页设计</div>
            <div class="type">电商设计</div>
        </div>
    </div>

    <div class="card ecommerce">
        <img src="https://picsum.photos/600/760?random=4">
        <div class="info">
            <div class="title">活动主视觉KV</div>
            <div class="type">电商设计</div>
        </div>
    </div>

    <!-- 视频 -->
    <div class="card video">
        <div class="video">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
        </div>
        <div class="info">
            <div class="title">品牌宣传片</div>
            <div class="type">视频</div>
        </div>
    </div>

    <!-- 公众号 -->
    <div class="card wechat">
        <img src="https://picsum.photos/600/900?random=5">
        <div class="info">
            <div class="title">公众号推文排版</div>
            <div class="type">公众号文章</div>
        </div>
    </div>

    <!-- 新闻稿 -->
    <div class="card news">
        <img src="https://picsum.photos/600/700?random=6">
        <div class="info">
            <div class="title">企业新闻稿案例</div>
            <div class="type">新闻稿</div>
        </div>
    </div>

</section>

<script>
function filterProjects(type, event){
    const cards = document.querySelectorAll('.card');
    const navs = document.querySelectorAll('nav a');

    navs.forEach(item => item.classList.remove('active'));
    event.target.classList.add('active');

    cards.forEach(card=>{
        if(type === 'all'){
            card.style.display = 'block';
        }else{
            card.style.display = card.classList.contains(type) ? 'block' : 'none';
        }
    });
}
</script>

</body>
</html>
