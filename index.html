<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>林歌作品网</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:#0d0d0d;
    color:#fff;
}

/* ===== 导航 ===== */
header{
    position:fixed;
    width:100%;
    top:0;
    background:rgba(13,13,13,0.9);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    z-index:999;
}
.logo{font-size:18px;font-weight:600}
nav a{
    margin-left:30px;
    color:#aaa;
    text-decoration:none;
}
nav a:hover{color:#fff}

/* ===== 首屏 ===== */
.hero{
    padding:160px 60px 80px;
}
.hero h1{
    font-size:60px;
    line-height:1.3;
}
.hero p{
    color:#aaa;
    margin:20px 0;
}
.btn{
    display:inline-block;
    padding:12px 28px;
    background:#fff;
    color:#000;
    border-radius:30px;
    cursor:pointer;
    font-size:14px;
}

/* ===== 数据 ===== */
.stats{
    display:flex;
    gap:60px;
    padding:40px 60px;
}
.stats div{
    font-size:28px;
}
.stats span{
    display:block;
    font-size:12px;
    color:#aaa;
}

/* ===== 服务 ===== */
.services{
    display:flex;
    gap:20px;
    padding:20px 60px;
}
.service{
    flex:1;
    padding:30px;
    background:#161616;
    border-radius:10px;
}

/* ===== 分类 ===== */
.filter{
    padding:40px 60px 10px;
}
.filter span{
    margin-right:20px;
    cursor:pointer;
    color:#888;
}
.filter .active{
    color:#fff;
    border-bottom:2px solid #fff;
}

/* ===== 瀑布流 ===== */
.grid{
    column-count:4;
    column-gap:20px;
    padding:20px 60px 80px;
}
.card{
    break-inside:avoid;
    margin-bottom:20px;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    position:relative;
}
.card img{
    width:100%;
    transition:.5s;
}
.card:hover img{
    transform:scale(1.08);
}
.card-title{
    position:absolute;
    bottom:10px;
    left:10px;
    opacity:0;
    transition:.3s;
}
.card:hover .card-title{
    opacity:1;
}

/* ===== 详情页（Behance风） ===== */
.page{
    display:none;
    padding:120px 60px;
}
.page h2{
    font-size:36px;
    margin-bottom:20px;
}
.page p{
    color:#aaa;
    margin-bottom:20px;
}
.page img{
    width:100%;
    margin-bottom:20px;
}
.back{
    position:fixed;
    top:30px;
    right:40px;
    font-size:14px;
    cursor:pointer;
}

/* ===== 联系 ===== */
.contact{
    padding:80px 60px;
    border-top:1px solid #222;
}
.contact h2{margin-bottom:20px}
.contact p{color:#aaa}

/* ===== 动画 ===== */
.fade{
    animation:fadeIn .6s ease;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1}
}

/* 响应式 */
@media(max-width:1000px){
    .grid{column-count:2}
}
</style>
</head>

<body>

<header>
    <div class="logo">林歌作品网</div>
    <nav>
        <a href="#">首页</a>
        <a href="#">作品</a>
        <a href="#">服务</a>
        <a href="#">联系</a>
    </nav>
</header>

<!-- ===== 首屏 ===== -->
<section class="hero">
    <h1>让设计直接产生商业价值</h1>
    <p>品牌视觉 · 电商转化 · 内容增长</p>
    <div class="btn" onclick="scrollToContact()">立即合作</div>
</section>

<!-- ===== 数据 ===== -->
<div class="stats">
    <div>50+<span>项目经验</span></div>
    <div>10+<span>服务行业</span></div>
    <div>95%<span>客户满意</span></div>
</div>

<!-- ===== 服务 ===== -->
<div class="services">
    <div class="service">电商设计（转化提升）</div>
    <div class="service">品牌视觉（高级感）</div>
    <div class="service">内容创作（涨粉）</div>
</div>

<!-- ===== 分类 ===== -->
<div class="filter">
    <span class="active" onclick="filterWork('all')">全部</span>
    <span onclick="filterWork('design')">平面</span>
    <span onclick="filterWork('ecom')">电商</span>
    <span onclick="filterWork('video')">视频</span>
</div>

<!-- ===== 作品 ===== -->
<div class="grid" id="grid"></div>

<!-- ===== 详情页 ===== -->
<div id="detailPage" class="page">
    <div class="back" onclick="back()">返回</div>
    <h2 id="dTitle"></h2>
    <p id="dDesc"></p>
    <div id="dImages"></div>
</div>

<!-- ===== 联系 ===== -->
<div class="contact" id="contact">
    <h2>合作咨询</h2>
    <p>微信：your_wechat</p>
    <p>邮箱：your@email.com</p>
</div>

<script>

/* ===== 数据（模拟 CMS） ===== */
const works = [
{
    title:"品牌海报",
    category:"design",
    desc:"提升品牌视觉识别，增强用户记忆",
    cover:"https://picsum.photos/500/700?1",
    images:["https://picsum.photos/900/1200?1","https://picsum.photos/900/1200?2"]
},
{
    title:"电商详情页",
    category:"ecom",
    desc:"转化率提升30%",
    cover:"https://picsum.photos/500/600?3",
    images:["https://picsum.photos/900/1200?3"]
},
{
    title:"短视频剪辑",
    category:"video",
    desc:"播放量提升200%",
    cover:"https://picsum.photos/500/650?4",
    images:["https://picsum.photos/900/600?4"]
}
];

/* ===== 渲染 ===== */
function render(list){
    const grid=document.getElementById("grid");
    grid.innerHTML="";
    list.forEach(w=>{
        const div=document.createElement("div");
        div.className="card fade";
        div.innerHTML=`
            <img src="${w.cover}">
            <div class="card-title">${w.title}</div>
        `;
        div.onclick=()=>openDetail(w);
        grid.appendChild(div);
    });
}

/* ===== 筛选 ===== */
function filterWork(type){
    document.querySelectorAll(".filter span").forEach(s=>s.classList.remove("active"));
    event.target.classList.add("active");

    if(type==="all") render(works);
    else render(works.filter(w=>w.category===type));
}

/* ===== 详情页 ===== */
function openDetail(w){
    document.getElementById("grid").style.display="none";
    const page=document.getElementById("detailPage");
    page.style.display="block";

    document.getElementById("dTitle").innerText=w.title;
    document.getElementById("dDesc").innerText=w.desc;

    const imgBox=document.getElementById("dImages");
    imgBox.innerHTML="";
    w.images.forEach(src=>{
        const img=document.createElement("img");
        img.src=src;
        img.className="fade";
        imgBox.appendChild(img);
    });
}

function back(){
    document.getElementById("detailPage").style.display="none";
    document.getElementById("grid").style.display="block";
}

/* ===== CTA ===== */
function scrollToContact(){
    document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}

/* 初始化 */
render(works);

</script>

</body>
</html>
