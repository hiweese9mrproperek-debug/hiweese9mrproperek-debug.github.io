<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My Portfolio</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

/* 导航 */
header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid #333;
}

nav a {
  margin:0 15px;
  color:#aaa;
  cursor:pointer;
  text-decoration:none;
}

nav a.active {
  color:#fff;
  border-bottom:2px solid #fff;
}

/* 区块 */
.section {
  display:none;
}

.section.active {
  display:block;
}

/* 网格 */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px 40px;
}

/* 卡片 */
.card {
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
}

.card .content {
  padding:10px;
}

/* 视频 */
.video-box {
  max-width:800px;
  margin:40px auto;
}
.video-box iframe {
  width:100%;
  height:450px;
  border-radius:12px;
}
</style>
</head>

<body>

<header>
  <div>我的作品集</div>
  <nav>
    <a onclick="show('graphic')" class="active">平面设计</a>
    <a onclick="show('ecommerce')">电商设计</a>
    <a onclick="show('video')">视频</a>
    <a onclick="show('wechat')">公众号文章</a>
    <a onclick="show('news')">新闻稿</a>
  </nav>
</header>

<!-- 平面设计 -->
<div id="graphic" class="section active">
  <div class="grid">
    <div class="card">
      <img src="https://picsum.photos/400/300?1">
      <div class="content">海报设计</div>
    </div>
  </div>
</div>

<!-- 电商设计 -->
<div id="ecommerce" class="section">
  <div class="grid">
    <div class="card">
      <img src="https://picsum.photos/400/300?2">
      <div class="content">电商详情页</div>
    </div>
  </div>
</div>

<!-- 视频 -->
<div id="video" class="section">
  <div class="video-box">
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
  </div>
</div>

<!-- 公众号文章 -->
<div id="wechat" class="section">
  <div class="grid">
    <div class="card">
      <img src="https://picsum.photos/400/200">
      <div class="content">
        公众号文章标题<br>
        <a href="#" style="color:#4da3ff;">阅读</a>
      </div>
    </div>
  </div>
</div>

<!-- 新闻稿 -->
<div id="news" class="section">
  <div class="grid">
    <div class="card">
      <div class="content">
        新闻稿标题<br>
        <a href="#" style="color:#4da3ff;">查看</a>
      </div>
    </div>
  </div>
</div>

<script>
function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}
</script>

</body>
</html>
